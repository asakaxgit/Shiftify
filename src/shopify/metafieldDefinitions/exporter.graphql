query ExportMetafieldDefinitions($ownerType: MetafieldOwnerType!, $cursor: String) {
  metafieldDefinitions(ownerType: $ownerType, first: 250, after: $cursor) {
    pageInfo {
      hasNextPage
      endCursor
    }
    nodes {
      name
      namespace
      key
      description
      type {
        name
      }
      ownerType
      pinnedPosition
      validations {
        name
        type
        value
      }
    }
  }
}

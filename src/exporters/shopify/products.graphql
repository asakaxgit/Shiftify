query ExportProducts($cursor: String) {
  products(first: 250, after: $cursor) {
    pageInfo {
      hasNextPage
      endCursor
    }
    nodes {
      id
      title
      handle
      descriptionHtml
      productType
      vendor
      status
      tags
      options {
        name
        values
      }
      variants(first: 100) {
        nodes {
          id
          title
          sku
          barcode
          price
          compareAtPrice
          inventoryPolicy
          inventoryItem {
            tracked
            measurement {
              weight {
                unit
                value
              }
            }
          }
          selectedOptions {
            name
            value
          }
          position
        }
      }
      images(first: 20) {
        nodes {
          id
          url
          altText
          width
          height
        }
      }
    }
  }
}
